name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'agentic-ai/**'
      - 'api/**'
      - 'ui/**'
      - 'mobile/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_agentic_ai:
        description: 'Run Agentic AI tests'
        type: boolean
        default: true
      run_api:
        description: 'Run API tests'
        type: boolean
        default: true
      run_ui:
        description: 'Run UI tests'
        type: boolean
        default: true
      run_mobile:
        description: 'Run Mobile tests'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────
# Change Detection
# ─────────────────────────────────────────────────────────
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      agentic-ai: ${{ steps.filter.outputs.agentic-ai }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agentic-ai:
              - 'agentic-ai/**'
            api:
              - 'api/**'
            ui:
              - 'ui/**'
            mobile:
              - 'mobile/**'

  # ─────────────────────────────────────────────────────────
  # Agentic AI Tests (Python)
  # ─────────────────────────────────────────────────────────
  test-agentic-ai:
    name: Agentic AI Tests
    needs: changes
    if: >
      needs.changes.outputs.agentic-ai == 'true' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_agentic_ai == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic-ai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            agentic-ai/requirements.txt
            agentic-ai/tests/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run linting
        run: |
          pip install "flake8>=7.2,<8" flake8-bugbear flake8-docstrings "black>=25.1,<26" "isort>=6,<7"
          black --check --skip-string-normalization --line-length=120 .
          isort --check --profile=black .
          flake8 --max-line-length=120 --extend-ignore=E203,E266,E501,W503 .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=95 \
            -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-agentic-ai
          path: agentic-ai/coverage.xml

  # ─────────────────────────────────────────────────────────
  # API Tests (Node / TypeScript)
  # ─────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    needs: changes
    if: >
      needs.changes.outputs.api == 'true' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_starter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_starter_test

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:ci -- --coverageThreshold='{"global":{"branches":60,"functions":60,"lines":60,"statements":60}}'
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_starter_test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: api/coverage/

  # ─────────────────────────────────────────────────────────
  # UI Tests (React / Vite)
  # ─────────────────────────────────────────────────────────
  test-ui:
    name: UI Tests
    needs: changes
    if: >
      needs.changes.outputs.ui == 'true' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci -- --coverageThreshold='{"global":{"branches":15,"functions":15,"lines":15,"statements":15}}'

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: ui/coverage/

  # ─────────────────────────────────────────────────────────
  # Mobile Tests (React Native / Expo)
  # ─────────────────────────────────────────────────────────
  test-mobile:
    name: Mobile Tests
    needs: changes
    if: >
      needs.changes.outputs.mobile == 'true' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --coverageThreshold='{"global":{"branches":60,"functions":60,"lines":60,"statements":60}}'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mobile
          path: mobile/coverage/
