default_language_version:
  python: python3.13
  node: '20.17.0'

repos:
  # ── General file quality hooks ────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: double-quote-string-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-case-conflict

  # ── Python: pyupgrade ─────────────────────────────────────
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: [--py311-plus, --keep-runtime-typing]
        files: ^agentic-ai/

  # ── Python: isort ─────────────────────────────────────────
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: ^agentic-ai/

  # ── Python: black ─────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--skip-string-normalization, --line-length=120]
        files: ^agentic-ai/

  # ── Python: flake8 ────────────────────────────────────────
  - repo: https://github.com/pycqa/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args: ["--extend-ignore=E203,E266,E501,W503", "--max-line-length=120"]
        files: ^agentic-ai/
        additional_dependencies:
          - flake8-bugbear
          - flake8-docstrings

  # ── Python: bandit (security scanning) ────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: ["-c", "agentic-ai/.bandit.yaml", "-r", "agentic-ai"]
        files: ^agentic-ai/

  # ── SQL formatting ────────────────────────────────────────
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.1
    hooks:
      - id: sqlfluff-lint
        args: ["--dialect=ansi"]
        exclude: "^(api|agentic-ai)/prisma/migrations/"
      - id: sqlfluff-fix
        args: ["--dialect=ansi"]
        exclude: "^(api|agentic-ai)/prisma/migrations/"

  # ── TypeScript / JavaScript: prettier ─────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|md)$
        exclude: |
          (?x)^(
            api/node_modules/|
            ui/node_modules/|
            mobile/node_modules/|
            agentic-ai/node_modules/|
            .*\.lock$|
            .*package-lock\.json$
          )
